# Render configuration for Eden Backend Listeners
# Deploy these as Background Workers

services:
  # Blockchain Listener (Custom Eden Blockchain)
  - type: worker
    name: eden-blockchain-listener
    runtime: python
    region: oregon
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python eden_blockchain_listener.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BLOCKCHAIN_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    autoDeploy: true

  # Web3 Listener (External Blockchain - Optional)
