# Render configuration for Eden Blockchain Server
# Deploy this as a Web Service

services:
  - type: web
    name: eden-blockchain-server
    runtime: python
    region: oregon
    plan: starter
    branch: main
    rootDir: blockchain
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT eden_blockchain_server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    healthCheckPath: /api/info
    autoDeploy: true
