# Render Blueprint - Single Web Service Deployment
# Deploys Dashboard + Blockchain + Listener in ONE service

services:
  - type: web
    name: eden-platform
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: BLOCKCHAIN_PORT
        value: 5000
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BLOCKCHAIN_URL
        value: http://localhost:5000
      - key: SYNC_INTERVAL
        value: 15
    healthCheckPath: /
    autoDeploy: true
