  #     - key: SUPABASE_URL
  #       sync: false
  #     - key: SUPABASE_SERVICE_KEY
  #       sync: false
  #   autoDeploy: true

# Database: Use Supabase (external)
# No database service needed as we're using Supabase cloud

# Static Site: Android APK hosting (optional)
# You can add a static site service to host the Android APK
